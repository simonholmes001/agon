name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: test-run
        run: |
          OUTPUT=$(npx vitest run --coverage --reporter=verbose 2>&1)
          echo "$OUTPUT"
          # Strip ANSI escape codes before parsing — Vitest emits bold/colour
          # sequences that break regex matching in CI environments.
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          # Extract test count from Vitest summary line, e.g. "Tests  154 passed (154)"
          TEST_COUNT=$(echo "$CLEAN" | grep -E 'Tests\s+[0-9]+\s+passed' | grep -oE '[0-9]+' | head -1 || echo "0")
          echo "test_count=$TEST_COUNT" >> "$GITHUB_OUTPUT"

      - name: Update README badges
        if: github.event_name == 'push'
        run: |
          bash .github/scripts/update-readme-badges.sh \
            "${{ steps.test-run.outputs.test_count }}" \
            "frontend/coverage/coverage-summary.json" \
            "README.md"
        working-directory: .

      - name: Commit updated badges
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
          else
            git commit -m "chore: update test & coverage badges [skip ci]"
            git push
          fi
        working-directory: .

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for .NET solution
        id: check
        run: |
          if find backend -name '*.sln' -o -name '*.csproj' 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  No .NET project found in backend/ — skipping."
          fi
        working-directory: .

      - name: Setup .NET
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        if: steps.check.outputs.exists == 'true'
        run: dotnet restore

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
