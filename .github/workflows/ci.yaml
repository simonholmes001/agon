name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    outputs:
      test_count: ${{ steps.test-run.outputs.test_count }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        id: test-run
        run: |
          OUTPUT=$(npx vitest run --coverage --reporter=verbose 2>&1)
          echo "$OUTPUT"
          # Strip ANSI escape codes before parsing — Vitest emits bold/colour
          # sequences that break regex matching in CI environments.
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          # Extract test count from Vitest summary line, e.g. "Tests  154 passed (154)"
          TEST_COUNT=$(echo "$CLEAN" | grep -E 'Tests\s+[0-9]+\s+passed' | grep -oE '[0-9]+' | head -1 || echo "0")
          echo "test_count=$TEST_COUNT" >> "$GITHUB_OUTPUT"

      - name: Upload coverage artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/coverage-summary.json
          retention-days: 1

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    outputs:
      test_count: ${{ steps.backend-test-run.outputs.test_count }}
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for .NET solution
        id: check
        run: |
          if find backend -name '*.sln' -o -name '*.csproj' 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  No .NET project found in backend/ — skipping."
          fi
        working-directory: .

      - name: Setup .NET
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        if: steps.check.outputs.exists == 'true'
        run: dotnet restore

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        id: backend-test-run
        run: |
          OUTPUT=$(dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" 2>&1)
          echo "$OUTPUT"
          # Extract test count from dotnet test summary, e.g. "Passed!  - Failed:     0, Passed:   122"
          BACKEND_COUNT=$(echo "$OUTPUT" | grep -oE 'Passed:\s+[0-9]+' | grep -oE '[0-9]+' | head -1 || echo "0")
          echo "test_count=${BACKEND_COUNT}" >> "$GITHUB_OUTPUT"

  update-badges:
    name: Update README Badges
    needs: [frontend-tests, backend-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend-coverage

      - name: Combine test counts and update badges
        run: |
          FRONTEND_COUNT="${{ needs.frontend-tests.outputs.test_count }}"
          BACKEND_COUNT="${{ needs.backend-tests.outputs.test_count }}"
          FRONTEND_COUNT=${FRONTEND_COUNT:-0}
          BACKEND_COUNT=${BACKEND_COUNT:-0}
          TOTAL_COUNT=$((FRONTEND_COUNT + BACKEND_COUNT))
          echo "📊 Frontend: $FRONTEND_COUNT | Backend: $BACKEND_COUNT | Total: $TOTAL_COUNT"

          bash .github/scripts/update-readme-badges.sh \
            "$TOTAL_COUNT" \
            "frontend-coverage/coverage-summary.json" \
            "README.md"

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
          else
            git commit -m "chore: update test & coverage badges [skip ci]"
            git push
          fi
