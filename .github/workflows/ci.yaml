name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  codex-review-tests:
    name: Codex Review Script Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run Codex review script tests
        run: node --test .github/scripts/codex-pr-review-core.test.mjs

  cli-changeset:
    name: CLI Changeset Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Require changeset for CLI source changes
        shell: bash
        run: |
          set -euo pipefail

          BASE_REF="${{ github.base_ref }}"
          git fetch origin "${BASE_REF}"

          CHANGED_FILES="$(git diff --name-only "origin/${BASE_REF}"...HEAD)"
          echo "Changed files:"
          echo "${CHANGED_FILES}"

          if ! echo "${CHANGED_FILES}" | grep -q '^cli/'; then
            echo "No CLI changes detected."
            exit 0
          fi

          CHANGESET_FILES="$(echo "${CHANGED_FILES}" | grep -E '^cli/\.changeset/[^/]+\.md$' | grep -v '^cli/\.changeset/README\.md$' || true)"
          if [ -n "${CHANGESET_FILES}" ]; then
            echo "Changeset file detected."
            exit 0
          fi

          echo "::error::CLI changes detected without a changeset file."
          echo "::error::Run 'npx --yes @changesets/cli add --cwd cli' and commit the generated file in cli/.changeset/."
          exit 1

  cli-tests:
    name: CLI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/npm-shrinkwrap.json

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Run CLI unit tests
        run: |
          npm run test

  cli-shell-regression:
    name: CLI Shell Regression
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/npm-shrinkwrap.json

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Run shell regression tests
        run: npm run test:shell-regression

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check for .NET solution
        id: check
        run: |
          if find backend -name '*.sln' -o -name '*.csproj' 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  No .NET project found in backend/ — skipping."
          fi
        working-directory: .

      - name: Setup .NET
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        if: steps.check.outputs.exists == 'true'
        run: dotnet restore

      - name: Build
        if: steps.check.outputs.exists == 'true'
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        if: steps.check.outputs.exists == 'true'
        run: dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
