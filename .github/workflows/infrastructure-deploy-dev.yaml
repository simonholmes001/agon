name: Infrastructure Deploy (Dev)

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-deploy-dev.yaml'
      - '.github/workflows/infrastructure-validate.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: infra-dev-deploy
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy Dev Infrastructure
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Login to Azure (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate required deployment secrets
        shell: bash
        env:
          AZURE_POSTGRES_ADMIN_PASSWORD: ${{ secrets.AZURE_POSTGRES_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${AZURE_POSTGRES_ADMIN_PASSWORD:-}" ]; then
            echo "::error::Missing AZURE_POSTGRES_ADMIN_PASSWORD secret."
            exit 1
          fi

      - name: Build Bicep templates
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2.2.0
        with:
          inlineScript: |
            az bicep install
            az bicep build --file infrastructure/bicep/main.bicep
            az bicep build --file infrastructure/bicep/modules/network-dev.bicep
            az bicep build --file infrastructure/bicep/modules/data-dev.bicep
            az bicep build --file infrastructure/bicep/modules/app-edge-dev.bicep
            az bicep build --file infrastructure/bicep/modules/keyvault-access-dev.bicep

      - name: Deploy dev infrastructure (subscription scope)
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2.2.0
        env:
          AZURE_POSTGRES_ADMIN_PASSWORD: ${{ secrets.AZURE_POSTGRES_ADMIN_PASSWORD }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          CLAUDE_KEY: ${{ secrets.CLAUDE_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        with:
          inlineScript: |
            az account show --query "{name:name, subscriptionId:id}" -o table
            az deployment sub create \
              --name "agon-dev-deploy-${{ github.run_id }}" \
              --location francecentral \
              --template-file infrastructure/bicep/main.bicep \
              --parameters @infrastructure/bicep/parameters/dev.parameters.json \
              --parameters postgresAdminPassword="$AZURE_POSTGRES_ADMIN_PASSWORD" \
              --parameters openAiApiKey="${OPENAI_KEY:-}" \
              --parameters anthropicApiKey="${CLAUDE_KEY:-}" \
              --parameters googleApiKey="${GEMINI_KEY:-}" \
              --parameters deepSeekApiKey="${DEEPSEEK_KEY:-}"
