name: Infrastructure Deploy (Dev)

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-deploy-dev.yaml'
      - '.github/workflows/infrastructure-validate.yaml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: infra-dev-deploy
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy Dev Infrastructure
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate required deployment secrets
        shell: bash
        env:
          AZURE_POSTGRES_ADMIN_PASSWORD: ${{ secrets.AZURE_POSTGRES_ADMIN_PASSWORD }}
          APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64: ${{ secrets.APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64 }}
          APP_GATEWAY_SSL_CERTIFICATE_PASSWORD: ${{ secrets.APP_GATEWAY_SSL_CERTIFICATE_PASSWORD }}
          AGON_API_HOSTNAME: ${{ secrets.AGON_API_HOSTNAME }}
          BLOB_STORAGE_CONNECTION_STRING: ${{ secrets.BLOB_STORAGE_CONNECTION_STRING }}
          AGON_JWT_AUTHORITY: ${{ secrets.AGON_JWT_AUTHORITY }}
          AGON_JWT_AUDIENCE: ${{ secrets.AGON_JWT_AUDIENCE }}
        run: |
          set -euo pipefail
          if [ -z "${AZURE_POSTGRES_ADMIN_PASSWORD:-}" ]; then
            echo "::error::Missing AZURE_POSTGRES_ADMIN_PASSWORD secret."
            exit 1
          fi
          if [ -z "${BLOB_STORAGE_CONNECTION_STRING:-}" ]; then
            echo "::error::Missing BLOB_STORAGE_CONNECTION_STRING secret."
            exit 1
          fi

          if [ -n "${APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64:-}" ] && [ -z "${APP_GATEWAY_SSL_CERTIFICATE_PASSWORD:-}" ]; then
            echo "::error::Missing APP_GATEWAY_SSL_CERTIFICATE_PASSWORD while APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64 is set."
            exit 1
          fi

          if [ -n "${APP_GATEWAY_SSL_CERTIFICATE_PASSWORD:-}" ] && [ -z "${APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64:-}" ]; then
            echo "::error::Missing APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64 while APP_GATEWAY_SSL_CERTIFICATE_PASSWORD is set."
            exit 1
          fi

          if [ -n "${APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64:-}" ] && [ -z "${AGON_API_HOSTNAME:-}" ]; then
            echo "::error::Missing AGON_API_HOSTNAME. HTTPS listener deployments require a public hostname for certificate validation."
            exit 1
          fi

          if [ -z "${AGON_JWT_AUTHORITY:-}" ]; then
            echo "::error::Missing AGON_JWT_AUTHORITY secret."
            exit 1
          fi

          if [ -z "${AGON_JWT_AUDIENCE:-}" ]; then
            echo "::error::Missing AGON_JWT_AUDIENCE secret."
            exit 1
          fi

      - name: Preflight check soft-deleted Document Intelligence accounts
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            NAME_PREFIX=$(sed -n '/"namePrefix"/,/"value"/p' infrastructure/bicep/parameters/dev.parameters.json | sed -n 's/.*"value"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)
            LOCATION=$(sed -n '/"location"/,/"value"/p' infrastructure/bicep/parameters/dev.parameters.json | sed -n 's/.*"value"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)
            if [ -z "${NAME_PREFIX}" ] || [ -z "${LOCATION}" ]; then
              echo "::warning::Unable to parse namePrefix/location from dev.parameters.json. Skipping soft-delete preflight."
              exit 0
            fi
            DATA_RG="rg-${NAME_PREFIX}-data"
            MATCHES=$(az cognitiveservices account list-deleted \
              --query "[?starts_with(name, 'docint-${NAME_PREFIX}-') && location=='${LOCATION}'].[name, location, deletionDate]" \
              -o tsv || true)
            if [ -n "${MATCHES}" ]; then
              echo "::warning::Soft-deleted Document Intelligence account(s) found for prefix ${NAME_PREFIX} in ${LOCATION}."
              echo "${MATCHES}"
              echo "::warning::Purge each stale account before rerun, for example:"
              echo "az cognitiveservices account purge --name <account-name> --resource-group ${DATA_RG} --location ${LOCATION}"
            fi

      - name: Build Bicep templates
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2.2.0
        with:
          inlineScript: |
            az bicep install
            az bicep build --file infrastructure/bicep/main.bicep
            az bicep build --file infrastructure/bicep/modules/network-dev.bicep
            az bicep build --file infrastructure/bicep/modules/data-dev.bicep
            az bicep build --file infrastructure/bicep/modules/app-edge-dev.bicep
            az bicep build --file infrastructure/bicep/modules/keyvault-access-dev.bicep
            az bicep build --file infrastructure/bicep/modules/storage-access-dev.bicep

      - name: Deploy dev infrastructure (subscription scope)
        uses: azure/cli@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2.2.0
        env:
          AZURE_POSTGRES_ADMIN_PASSWORD: ${{ secrets.AZURE_POSTGRES_ADMIN_PASSWORD }}
          BLOB_STORAGE_CONNECTION_STRING: ${{ secrets.BLOB_STORAGE_CONNECTION_STRING }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          CLAUDE_KEY: ${{ secrets.CLAUDE_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64: ${{ secrets.APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64 }}
          APP_GATEWAY_SSL_CERTIFICATE_PASSWORD: ${{ secrets.APP_GATEWAY_SSL_CERTIFICATE_PASSWORD }}
          AGON_API_HOSTNAME: ${{ secrets.AGON_API_HOSTNAME }}
          APP_GATEWAY_SSL_POLICY_NAME: ${{ secrets.APP_GATEWAY_SSL_POLICY_NAME }}
          AGON_JWT_AUTHORITY: ${{ secrets.AGON_JWT_AUTHORITY }}
          AGON_JWT_AUDIENCE: ${{ secrets.AGON_JWT_AUDIENCE }}
          AGON_JWT_INTERACTIVE_CLIENT_ID: ${{ secrets.AGON_JWT_INTERACTIVE_CLIENT_ID }}
        with:
          inlineScript: |
            az account show --query "{name:name, subscriptionId:id}" -o table
            az deployment sub create \
              --name "agon-dev-deploy-${{ github.run_id }}" \
              --location swedencentral \
              --template-file infrastructure/bicep/main.bicep \
              --parameters @infrastructure/bicep/parameters/dev.parameters.json \
              --parameters postgresAdminPassword="$AZURE_POSTGRES_ADMIN_PASSWORD" \
              --parameters openAiApiKey="${OPENAI_KEY:-}" \
              --parameters anthropicApiKey="${CLAUDE_KEY:-}" \
              --parameters googleApiKey="${GEMINI_KEY:-}" \
              --parameters deepSeekApiKey="${DEEPSEEK_KEY:-}" \
              --parameters appGatewaySslCertificatePfxBase64="${APP_GATEWAY_SSL_CERTIFICATE_PFX_BASE64:-}" \
              --parameters appGatewaySslCertificatePassword="${APP_GATEWAY_SSL_CERTIFICATE_PASSWORD:-}" \
              --parameters appGatewayPublicHostName="${AGON_API_HOSTNAME:-}" \
              --parameters appGatewaySslPolicyName="${APP_GATEWAY_SSL_POLICY_NAME:-AppGwSslPolicy20220101S}" \
              --parameters blobStorageConnectionString="${BLOB_STORAGE_CONNECTION_STRING:-}" \
              --parameters authEnabled=true \
              --parameters jwtAuthority="${AGON_JWT_AUTHORITY}" \
              --parameters jwtAudience="${AGON_JWT_AUDIENCE}" \
              --parameters jwtInteractiveClientId="${AGON_JWT_INTERACTIVE_CLIENT_ID:-}"
