name: Release CLI (Changesets + npm)

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/publish-cli.yaml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

jobs:
  release-cli:
    name: Version and publish @agon_agents/cli
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Ensure npm CLI supports trusted publishing
        run: |
          npm i -g npm@^11.5.1
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Version / Release with Changesets
        id: changesets
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          cwd: cli
          version: npx --yes @changesets/cli version
          publish: bash ../.github/scripts/publish-cli-if-needed.sh
          title: 'chore(release): version @agon_agents/cli'
          commit: 'chore(release): version @agon_agents/cli'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Verify npm latest metadata for released CLI version
        if: steps.changesets.outputs.published == 'true'
        working-directory: .
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node .github/scripts/verify-cli-release-metadata.mjs

      - name: Exempt changeset release PR from required checks
        uses: actions/github-script@v9
        env:
          CHANGESET_PR_NUMBER: ${{ steps.changesets.outputs.pullRequestNumber }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let releasePr = null;
            const prNumber = Number.parseInt(process.env.CHANGESET_PR_NUMBER || '', 10);
            if (Number.isInteger(prNumber)) {
              const prResponse = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber,
              });
              releasePr = prResponse.data;
            } else {
              const prs = await github.paginate(github.rest.pulls.list, {
                owner,
                repo,
                state: 'open',
                per_page: 100,
                sort: 'updated',
                direction: 'desc',
              });

              releasePr = prs.find((pr) =>
                pr.user?.login === 'github-actions[bot]' &&
                pr.head?.ref?.startsWith('changeset-release/')
              );
            }

            if (!releasePr) {
              core.info('No open changeset release PR found; skipping required-check exemption statuses.');
              return;
            }

            const exemptContexts = ['Codex Review', 'CLI Shell Regression'];
            for (const contextName of exemptContexts) {
              await github.rest.repos.createCommitStatus({
                owner,
                repo,
                sha: releasePr.head.sha,
                state: 'success',
                context: contextName,
                description: 'Exempt: automated changeset release PR',
              });
            }

            core.info(
              `Set required-check exemption statuses (${exemptContexts.join(', ')}) for PR #${releasePr.number} on ${releasePr.head.sha}.`,
            );
