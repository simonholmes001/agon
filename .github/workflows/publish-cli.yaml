name: Release CLI (Changesets + npm)

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/publish-cli.yaml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-cli:
    name: Version and publish @agon_agents/cli
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Ensure npm CLI supports trusted publishing
        run: |
          npm i -g npm@^11.5.1
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci --workspaces=false

      - name: Expose .changeset at repo root for action discovery
        working-directory: .
        run: |
          if [ ! -e .changeset ]; then
            ln -s cli/.changeset .changeset
          fi

      - name: Version / Release with Changesets
        uses: changesets/action@v1
        with:
          cwd: cli
          version: npx --yes @changesets/cli version
          publish: bash ../.github/scripts/publish-cli-if-needed.sh
          title: 'chore(release): version @agon_agents/cli'
          commit: 'chore(release): version @agon_agents/cli'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
