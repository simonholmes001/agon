name: CI

on:
  push:
    branches: [main]
    paths:
      - 'cli/**'
  pull_request:
    branches: [main]
    paths:
      - 'cli/**'

jobs:
  test:
    name: Test CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cli

      - name: Build
        run: npm run build
        working-directory: cli

      - name: Run tests
        run: npm test
        working-directory: cli
