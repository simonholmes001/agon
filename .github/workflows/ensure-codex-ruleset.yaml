name: Ensure Codex Review Ruleset

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ensure-ruleset:
    name: Ensure Codex Review Required
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.base.ref == 'main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Ensure Codex ruleset
        env:
          REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
          CODEX_RULESET_NAME: Require Codex Review
          CODEX_REVIEW_CHECK: Codex Review
          CODEX_RULESET_BRANCH: refs/heads/main
        run: node .github/scripts/ensure-codex-ruleset.mjs
