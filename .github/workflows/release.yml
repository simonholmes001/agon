name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write       # create GitHub Releases and tags
      pull-requests: write  # open/update the "Version Packages" PR
      id-token: write       # npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required so changesets can diff against the base branch
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .

      - name: Build CLI (required before changeset publish)
        run: npm run build
        working-directory: cli

      - name: Create Release PR or Publish to npm
        uses: changesets/action@v1
        with:
          # changeset publish skips versions already on npm, preventing
          # re-publish failures when the pipeline retries.
          publish: npx changeset publish
          # Customise the version PR title and commit message.
          title: 'chore: version packages'
          commit: 'chore: version packages'
          # Automatically create a GitHub Release for each published package.
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
