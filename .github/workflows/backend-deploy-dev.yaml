name: Backend Deploy (Dev)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy-dev.yaml'
      - 'infrastructure/bicep/main.bicep'
      - 'infrastructure/bicep/modules/app-edge-dev.bicep'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: backend-dev-deploy
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Build, Push, and Deploy Backend (Dev)
    runs-on: ubuntu-latest
    environment:
      name: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run backend tests
        working-directory: backend
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet test --no-build --configuration Release --verbosity normal

      - name: Validate required Docker Hub secrets
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_IMAGE_NAME: ${{ secrets.DOCKERHUB_IMAGE_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "::error::Missing DOCKERHUB_USERNAME secret."
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "::error::Missing DOCKERHUB_TOKEN secret."
            exit 1
          fi
          if [ -z "${DOCKERHUB_IMAGE_NAME:-}" ]; then
            echo "::error::Missing DOCKERHUB_IMAGE_NAME secret (example: youruser/agon-backend)."
            exit 1
          fi

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tags
        id: image
        shell: bash
        env:
          DOCKERHUB_IMAGE_NAME: ${{ secrets.DOCKERHUB_IMAGE_NAME }}
        run: |
          set -euo pipefail
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          echo "tag_sha=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${DOCKERHUB_IMAGE_NAME}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${DOCKERHUB_IMAGE_NAME}:dev-latest" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_sha }}
            ${{ steps.image.outputs.image_latest }}

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve App Service name
        id: app
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            APPS=$(az webapp list \
              --query "[?tags.environment=='dev' && tags.workload=='agon'].[name,resourceGroup]" \
              --output tsv)

            if [ -z "${APPS}" ]; then
              APPS=$(az webapp list \
                --query "[?starts_with(name, 'app-agon-dev-')].[name,resourceGroup]" \
                --output tsv)
            fi

            if [ -z "${APPS}" ]; then
              echo "No dev App Service found for workload 'agon'. Deploy infrastructure first."
              exit 1
            fi

            PREFERRED=$(echo "${APPS}" | awk '$2 ~ /-swc-/ {print $0; exit}')
            if [ -n "${PREFERRED}" ]; then
              APP_NAME=$(echo "${PREFERRED}" | awk '{print $1}')
              APP_RESOURCE_GROUP=$(echo "${PREFERRED}" | awk '{print $2}')
            else
              APP_NAME=$(echo "${APPS}" | head -n1 | awk '{print $1}')
              APP_RESOURCE_GROUP=$(echo "${APPS}" | head -n1 | awk '{print $2}')
            fi

            echo "Resolved app service: ${APP_NAME}"
            echo "Resolved app resource group: ${APP_RESOURCE_GROUP}"
            echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
            echo "app_resource_group=${APP_RESOURCE_GROUP}" >> "$GITHUB_OUTPUT"

      - name: Configure App Service container image
        uses: azure/cli@v2
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          inlineScript: |
            az webapp config container set \
              --resource-group "${{ steps.app.outputs.app_resource_group }}" \
              --name "${{ steps.app.outputs.app_name }}" \
              --container-image-name "${{ steps.image.outputs.image_sha }}" \
              --container-registry-url "https://index.docker.io" \
              --container-registry-user "${DOCKERHUB_USERNAME}" \
              --container-registry-password "${DOCKERHUB_TOKEN}"

            az webapp config appsettings set \
              --resource-group "${{ steps.app.outputs.app_resource_group }}" \
              --name "${{ steps.app.outputs.app_name }}" \
              --settings WEBSITES_PORT=8080

      - name: Restart App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart \
              --resource-group "${{ steps.app.outputs.app_resource_group }}" \
              --name "${{ steps.app.outputs.app_name }}"

      - name: Verify health through Application Gateway
        uses: azure/cli@v2
        with:
          inlineScript: |
            set -euo pipefail
            APP_RG="${{ steps.app.outputs.app_resource_group }}"
            AGW_NAME=$(az network application-gateway list \
              --resource-group "${APP_RG}" \
              --query "[?tags.environment=='dev' && tags.workload=='agon'].name | [0]" \
              --output tsv)

            if [ -z "${AGW_NAME}" ] || [ "${AGW_NAME}" = "null" ]; then
              AGW_NAME=$(az network application-gateway list \
                --resource-group "${APP_RG}" \
                --query "[?starts_with(name, 'agw-agon-dev-')].name | [0]" \
                --output tsv)
            fi

            if [ -z "${AGW_NAME}" ] || [ "${AGW_NAME}" = "null" ]; then
              echo "Failed to resolve Application Gateway in ${APP_RG}."
              exit 1
            fi

            AGW_PIP_ID=$(az network application-gateway show \
              --resource-group "${APP_RG}" \
              --name "${AGW_NAME}" \
              --query "frontendIPConfigurations[0].publicIPAddress.id" \
              --output tsv)

            if [ -z "${AGW_PIP_ID}" ] || [ "${AGW_PIP_ID}" = "null" ]; then
              echo "Failed to resolve Application Gateway public IP reference."
              exit 1
            fi

            AGW_IP=$(az network public-ip show \
              --ids "${AGW_PIP_ID}" \
              --query ipAddress \
              --output tsv)

            if [ -z "${AGW_IP}" ] || [ "${AGW_IP}" = "null" ]; then
              echo "Failed to resolve Application Gateway public IP."
              exit 1
            fi

            echo "Checking health at http://${AGW_IP}/health"

            for i in {1..30}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${AGW_IP}/health" || true)
              if [ "${STATUS}" = "200" ]; then
                echo "Backend is healthy via Application Gateway."
                exit 0
              fi
              echo "Attempt ${i}/30: status=${STATUS}, waiting..."
              sleep 20
            done

            echo "Backend failed health check through Application Gateway."
            exit 1
