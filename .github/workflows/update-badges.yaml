name: Update Badges

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-badges-main
  cancel-in-progress: false

jobs:
  update-badges:
    name: Update README Badges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        run: npm ci --workspaces=false
        working-directory: cli

      - name: Run CLI unit tests
        id: cli-tests
        run: |
          OUTPUT=$(npm run test 2>&1)
          echo "$OUTPUT"
          # Strip ANSI escape codes before parsing
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          TEST_COUNT=$(echo "$CLEAN" | grep -E 'Tests\s+[0-9]+\s+passed' | grep -oE '[0-9]+' | head -1 || echo "0")
          echo "test_count=$TEST_COUNT" >> "$GITHUB_OUTPUT"
        working-directory: cli

      - name: Run CLI coverage (non-gating for badge generation)
        run: |
          npx vitest run \
            --coverage \
            --reporter=verbose \
            --coverage.reporter=json-summary \
            --coverage.reporter=text \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.functions=0 \
            --coverage.thresholds.branches=0 \
            --coverage.thresholds.statements=0
        working-directory: cli

      - name: Check for .NET solution
        id: check-backend
        run: |
          if find backend -name '*.sln' -o -name '*.csproj' 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.check-backend.outputs.exists == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Build backend
        if: steps.check-backend.outputs.exists == 'true'
        run: dotnet build --configuration Release
        working-directory: backend

      - name: Run backend tests
        if: steps.check-backend.outputs.exists == 'true'
        id: backend-tests
        run: |
          COVERAGE_DIR="/tmp/agon-backend-coverage"
          rm -rf "$COVERAGE_DIR"
          mkdir -p "$COVERAGE_DIR"

          OUTPUT=$(dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory "$COVERAGE_DIR" 2>&1)
          echo "$OUTPUT"
          BACKEND_COUNT=$(echo "$OUTPUT" \
            | sed -nE 's/.*Passed:[[:space:]]+([0-9]+).*/\1/p' \
            | awk '{sum += $1} END {print sum + 0}')
          echo "test_count=${BACKEND_COUNT}" >> "$GITHUB_OUTPUT"
        working-directory: backend

      - name: Combine test counts and update badges
        run: |
          CLI_COUNT="${{ steps.cli-tests.outputs.test_count }}"
          BACKEND_COUNT="${{ steps.backend-tests.outputs.test_count }}"
          CLI_COUNT=${CLI_COUNT:-0}
          BACKEND_COUNT=${BACKEND_COUNT:-0}
          TOTAL_COUNT=$((CLI_COUNT + BACKEND_COUNT))
          echo "📊 CLI: $CLI_COUNT | Backend: $BACKEND_COUNT | Total: $TOTAL_COUNT"

          CLI_COVERED=$(jq -r '.total.lines.covered // 0' cli/coverage/coverage-summary.json)
          CLI_LINES=$(jq -r '.total.lines.total // 0' cli/coverage/coverage-summary.json)

          BACKEND_COVERED=0
          BACKEND_LINES=0
          while IFS= read -r FILE; do
            HEADER=$(grep -m1 '<coverage ' "$FILE" || true)
            C=$(echo "$HEADER" | sed -nE 's/.*lines-covered="([0-9]+)".*/\1/p')
            V=$(echo "$HEADER" | sed -nE 's/.*lines-valid="([0-9]+)".*/\1/p')
            BACKEND_COVERED=$((BACKEND_COVERED + ${C:-0}))
            BACKEND_LINES=$((BACKEND_LINES + ${V:-0}))
          done < <(find /tmp/agon-backend-coverage -name 'coverage.cobertura.xml' 2>/dev/null || true)

          TOTAL_COVERED=$((CLI_COVERED + BACKEND_COVERED))
          TOTAL_LINES=$((CLI_LINES + BACKEND_LINES))
          COMBINED_PCT=$(awk -v c="$TOTAL_COVERED" -v t="$TOTAL_LINES" 'BEGIN { if (t == 0) print 0; else printf "%.0f", (100*c/t) }')
          echo "📊 Coverage CLI: $CLI_COVERED/$CLI_LINES | Backend: $BACKEND_COVERED/$BACKEND_LINES | Combined: ${COMBINED_PCT}%"

          COMBINED_COVERAGE_JSON="/tmp/agon-combined-coverage-summary.json"
          printf '{"total":{"lines":{"pct":%s}}}\n' "$COMBINED_PCT" > "$COMBINED_COVERAGE_JSON"

          bash .github/scripts/update-readme-badges.sh \
            "$TOTAL_COUNT" \
            "$COMBINED_COVERAGE_JSON" \
            "README.md"

      - name: Ensure Codex ruleset bypass supports badge automation
        if: ${{ secrets.REPO_ADMIN_TOKEN != '' }}
        env:
          REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
          CODEX_RULESET_NAME: Require Codex Review
          CODEX_REVIEW_CHECK: Codex Review
          CODEX_RULESET_BRANCH: refs/heads/main
          CODEX_BYPASS_REPOSITORY_ROLE_IDS: "2"
          CODEX_BYPASS_INTEGRATION_ID: "15368"
        run: node .github/scripts/ensure-codex-ruleset.mjs

      - name: Commit updated badges
        env:
          REPO_ADMIN_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
          else
            git commit -m "chore: update test & coverage badges [skip ci]"
            if git push origin HEAD:main; then
              echo "Pushed badge update via default workflow token."
              exit 0
            fi

            if [ -n "${REPO_ADMIN_TOKEN}" ]; then
              echo "Default push failed; retrying with REPO_ADMIN_TOKEN."
              git config --local --unset-all http.https://github.com/.extraheader || true
              git remote set-url origin "https://x-access-token:${REPO_ADMIN_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
              if git push origin HEAD:main; then
                echo "Pushed badge update via REPO_ADMIN_TOKEN."
                exit 0
              fi
            fi

            echo "::error::Failed to push badge update to main. Ensure ruleset bypass includes GitHub Actions (integration id 15368) and/or the repository role of REPO_ADMIN_TOKEN."
            exit 1
          fi
