name: Update Badges

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-badges-main
  cancel-in-progress: false

jobs:
  update-badges:
    name: Update README Badges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        run: npm ci --workspaces=false
        working-directory: cli

      - name: Run CLI unit tests
        id: cli-tests
        run: |
          OUTPUT=$(npm run test 2>&1)
          echo "$OUTPUT"
          # Strip ANSI escape codes before parsing
          CLEAN=$(printf '%s\n' "$OUTPUT" | awk '{ gsub(/\033\[[0-9;]*m/, ""); print }')
          TEST_COUNT=$(echo "$CLEAN" | grep -E 'Tests\s+[0-9]+\s+passed' | grep -oE '[0-9]+' | head -1 || echo "0")
          echo "test_count=$TEST_COUNT" >> "$GITHUB_OUTPUT"
        working-directory: cli

      - name: Run CLI coverage (non-gating for badge generation)
        run: |
          npx vitest run \
            --coverage \
            --reporter=verbose \
            --coverage.reporter=json-summary \
            --coverage.reporter=text \
            --coverage.thresholds.lines=0 \
            --coverage.thresholds.functions=0 \
            --coverage.thresholds.branches=0 \
            --coverage.thresholds.statements=0
        working-directory: cli

      - name: Check for .NET solution
        id: check-backend
        run: |
          if find backend -name '*.sln' -o -name '*.csproj' 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.check-backend.outputs.exists == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Build backend
        if: steps.check-backend.outputs.exists == 'true'
        run: dotnet build --configuration Release
        working-directory: backend

      - name: Run backend tests
        if: steps.check-backend.outputs.exists == 'true'
        id: backend-tests
        run: |
          COVERAGE_DIR="/tmp/agon-backend-coverage"
          rm -rf "$COVERAGE_DIR"
          mkdir -p "$COVERAGE_DIR"

          OUTPUT=$(dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory "$COVERAGE_DIR" 2>&1)
          echo "$OUTPUT"
          BACKEND_COUNT=$(echo "$OUTPUT" \
            | sed -nE 's/.*Passed:[[:space:]]+([0-9]+).*/\1/p' \
            | awk '{sum += $1} END {print sum + 0}')
          echo "test_count=${BACKEND_COUNT}" >> "$GITHUB_OUTPUT"
        working-directory: backend

      - name: Combine test counts and update badges
        run: |
          CLI_COUNT="${{ steps.cli-tests.outputs.test_count }}"
          BACKEND_COUNT="${{ steps.backend-tests.outputs.test_count }}"
          CLI_COUNT=${CLI_COUNT:-0}
          BACKEND_COUNT=${BACKEND_COUNT:-0}
          TOTAL_COUNT=$((CLI_COUNT + BACKEND_COUNT))
          echo "📊 CLI: $CLI_COUNT | Backend: $BACKEND_COUNT | Total: $TOTAL_COUNT"

          CLI_COVERED=$(jq -r '.total.lines.covered // 0' cli/coverage/coverage-summary.json)
          CLI_LINES=$(jq -r '.total.lines.total // 0' cli/coverage/coverage-summary.json)

          BACKEND_COVERED=0
          BACKEND_LINES=0
          while IFS= read -r FILE; do
            HEADER=$(grep -m1 '<coverage ' "$FILE" || true)
            C=$(echo "$HEADER" | sed -nE 's/.*lines-covered="([0-9]+)".*/\1/p')
            V=$(echo "$HEADER" | sed -nE 's/.*lines-valid="([0-9]+)".*/\1/p')
            BACKEND_COVERED=$((BACKEND_COVERED + ${C:-0}))
            BACKEND_LINES=$((BACKEND_LINES + ${V:-0}))
          done < <(find /tmp/agon-backend-coverage -name 'coverage.cobertura.xml' 2>/dev/null || true)

          TOTAL_COVERED=$((CLI_COVERED + BACKEND_COVERED))
          TOTAL_LINES=$((CLI_LINES + BACKEND_LINES))
          COMBINED_PCT=$(awk -v c="$TOTAL_COVERED" -v t="$TOTAL_LINES" 'BEGIN { if (t == 0) print 0; else printf "%.0f", (100*c/t) }')
          echo "📊 Coverage CLI: $CLI_COVERED/$CLI_LINES | Backend: $BACKEND_COVERED/$BACKEND_LINES | Combined: ${COMBINED_PCT}%"

          COMBINED_COVERAGE_JSON="/tmp/agon-combined-coverage-summary.json"
          printf '{"total":{"lines":{"pct":%s}}}\n' "$COMBINED_PCT" > "$COMBINED_COVERAGE_JSON"

          bash .github/scripts/update-readme-badges.sh \
            "$TOTAL_COUNT" \
            "$COMBINED_COVERAGE_JSON" \
            "README.md"

      - name: Create or update badges PR
        id: create_badges_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          commit-message: "chore: update test & coverage badges"
          branch: "chore/update-badges"
          delete-branch: true
          title: "chore: update test & coverage badges"
          body: |
            Automated badge refresh generated by the `Update Badges` workflow.
          add-paths: |
            README.md

      - name: Fallback create badges PR when action API call fails
        if: steps.create_badges_pr.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const base = 'main';
            const headBranch = 'chore/update-badges';
            const head = `${owner}:${headBranch}`;
            const title = 'chore: update test & coverage badges';
            const body = 'Automated badge refresh generated by the `Update Badges` workflow.';

            const existing = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              head,
              base,
              per_page: 100,
            });

            if (existing.length > 0) {
              core.info(`Fallback: existing badges PR #${existing[0].number} already open.`);
              return;
            }

            for (let attempt = 1; attempt <= 3; attempt += 1) {
              try {
                const pr = await github.rest.pulls.create({
                  owner,
                  repo,
                  title,
                  head: headBranch,
                  base,
                  body,
                  maintainer_can_modify: true,
                });
                core.info(`Fallback: created badges PR #${pr.data.number}.`);
                return;
              } catch (error) {
                if (attempt === 3) {
                  throw error;
                }
                core.warning(`Fallback PR create attempt ${attempt} failed: ${error.message}`);
                await new Promise((resolve) => setTimeout(resolve, attempt * 2000));
              }
            }
