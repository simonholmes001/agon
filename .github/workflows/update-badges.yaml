name: Update Badges

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-badges-main
  cancel-in-progress: false

jobs:
  update-badges:
    name: Update README Badges
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests with coverage
        id: frontend-tests
        run: |
          OUTPUT=$(npx vitest run --coverage --reporter=verbose 2>&1)
          echo "$OUTPUT"
          # Strip ANSI escape codes before parsing
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          TEST_COUNT=$(echo "$CLEAN" | grep -E 'Tests\s+[0-9]+\s+passed' | grep -oE '[0-9]+' | head -1 || echo "0")
          echo "test_count=$TEST_COUNT" >> "$GITHUB_OUTPUT"
        working-directory: frontend

      - name: Check for .NET solution
        id: check-backend
        run: |
          if find backend -name '*.sln' -o -name '*.csproj' 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.check-backend.outputs.exists == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build backend
        if: steps.check-backend.outputs.exists == 'true'
        run: dotnet build --configuration Release
        working-directory: backend

      - name: Run backend tests
        if: steps.check-backend.outputs.exists == 'true'
        id: backend-tests
        run: |
          OUTPUT=$(dotnet test --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" 2>&1)
          echo "$OUTPUT"
          BACKEND_COUNT=$(echo "$OUTPUT" \
            | sed -nE 's/.*Passed:[[:space:]]+([0-9]+).*/\1/p' \
            | awk '{sum += $1} END {print sum + 0}')
          echo "test_count=${BACKEND_COUNT}" >> "$GITHUB_OUTPUT"
        working-directory: backend

      - name: Combine test counts and update badges
        run: |
          FRONTEND_COUNT="${{ steps.frontend-tests.outputs.test_count }}"
          BACKEND_COUNT="${{ steps.backend-tests.outputs.test_count }}"
          FRONTEND_COUNT=${FRONTEND_COUNT:-0}
          BACKEND_COUNT=${BACKEND_COUNT:-0}
          TOTAL_COUNT=$((FRONTEND_COUNT + BACKEND_COUNT))
          echo "📊 Frontend: $FRONTEND_COUNT | Backend: $BACKEND_COUNT | Total: $TOTAL_COUNT"

          bash .github/scripts/update-readme-badges.sh \
            "$TOTAL_COUNT" \
            "frontend/coverage/coverage-summary.json" \
            "README.md"

      - name: Commit updated badges
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No badge changes to commit."
          else
            git commit -m "chore: update test & coverage badges [skip ci]"
            if ! git push origin HEAD:main; then
              echo "::error::Failed to push badge update to main. Ensure workflow permissions include contents: write and branch protection allows github-actions[bot] to push."
              exit 1
            fi
          fi
